name: release-please

# Watches `main` for Conventional Commits (= `feat:`, `fix:`, `chore:`, etc.)
# and maintains an open "Release PR" that bumps package.json + manifest +
# CHANGELOG. When that PR is merged, release-please creates a tag and a
# GitHub Release — which trips `release.yml` to publish to npm with
# provenance.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
