name: Release

on:
  release:
    types: [published]

# Allow only one release at a time
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # npm provenance (= "Verified publisher" badge)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org/"

      - run: pnpm install --frozen-lockfile

      - name: Verify release tag matches package.json version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Release tag v$TAG does not match package.json version $PKG"
            exit 1
          fi
          echo "Releasing version $PKG"

      - run: pnpm build
      - run: pnpm exec biome check

      - name: Publish to npm
        run: pnpm publish --access public --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
