name: Release

# release-please watches `main` for Conventional Commits and maintains an
# open "Release PR" (= package.json + manifest + CHANGELOG bump). Merging
# that PR causes release-please to create a tag + GitHub Release; the
# `publish` job below then runs in the same workflow run and pushes to npm
# with provenance.
#
# We keep both jobs in one workflow because GitHub deliberately does NOT
# trigger a separate workflow from events created with GITHUB_TOKEN — so a
# split-file design (= release-please.yml + release.yml) would silently
# fail to publish. `needs:` between jobs in the same workflow is exempt
# from that restriction.

on:
  push:
    branches: [main]

# Only one release run in flight; never cancel one already releasing.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write # release-please creates commits / tags / releases
  pull-requests: write # release-please opens the Release PR
  id-token: write # npm provenance (= "Verified publisher" badge)

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          # PAT 経由で PR を作る。GITHUB_TOKEN だと PR が他 workflow を
          # trigger しない GitHub の制限のせいで CI が走らず status check が
          # 永久に未達になるため、release-please 公式推奨どおり PAT を使う。
          # PAT 権限: Contents (write), Pull requests (write),
          #           Workflows (write), Issues (write)
          token: ${{ secrets.GH_PAT }}

  publish:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org/"

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm exec biome check

      - name: Publish to npm
        run: pnpm publish --access public --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
